<div class="d-flex justify-content-center align-items-center min-vh-100 bg-light">
  <div class="card shadow-lg p-4 rounded-4" style="width: 100%; max-width: 420px;">
    <div class="card-body">
      <h4 class="text-center mb-3 text-primary fw-bold">
        🔐 Recuperar Contraseña
      </h4>

      <p class="text-muted text-center mb-4" style="font-size: 0.95rem;">
        Ingresa tu correo electrónico o número de documento asociado a tu cuenta.
        Te enviaremos un enlace para que puedas restablecer tu contraseña.
      </p>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <div class="mb-3">
          <label for="identifier" class="form-label fw-semibold">
            📧 Correo electrónico o número de documento
          </label>
          <input id="identifier" type="text" class="form-control" formControlName="identifier"
            [ngClass]="{ 'is-invalid': submitted && identifier?.invalid }"
            placeholder="Ej: correo@ejemplo.com o 1234567890" />
          <div *ngIf="submitted && identifier?.invalid" class="invalid-feedback">
            <div *ngIf="identifier?.errors?.['required']">
              Este campo es obligatorio.
            </div>
            <div *ngIf="identifier?.errors?.['pattern']">
              Debe ingresar un correo válido o número de documento válido (mín. 6 dígitos).
            </div>
          </div>
        </div>

        <button type="submit"
          class="btn btn-warning text-dark w-100 fw-bold d-flex justify-content-center align-items-center"
          [disabled]="loading">
          <output *ngIf="loading" class="spinner-border spinner-border-sm me-2"></output>
          {{ loading ? 'Enviando...' : 'Enviar enlace de recuperación' }}
        </button>
      </form>

      <div class="text-center mt-3">
        <a routerLink="/login" class="text-decoration-none text-primary" style="font-size: 0.9rem;">
          🔙 Volver al inicio de sesión
        </a>
      </div>
    </div>
  </div>
</div>
